<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OH卡四轮随机选择课堂网页</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --primary: #4f7cff;
      --primary-dark: #345de0;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #d7dce5;
      --shadow: 0 8px 24px rgba(16, 24, 40, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      background: linear-gradient(135deg, #4f7cff, #6f8cff);
      color: white;
      padding: 18px 24px;
      box-shadow: var(--shadow);
    }

    header h1 {
      margin: 0 0 6px;
      font-size: 24px;
    }

    header p {
      margin: 0;
      opacity: 0.95;
      font-size: 14px;
    }

    .app {
      display: grid;
      grid-template-columns: 280px 1fr 320px;
      gap: 16px;
      padding: 16px;
      min-height: calc(100vh - 80px);
    }

    .panel {
      background: var(--card);
      border-radius: 16px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(215, 220, 229, 0.8);
      overflow: hidden;
    }

    .panel h2 {
      margin: 0;
      padding: 14px 16px;
      font-size: 16px;
      border-bottom: 1px solid var(--border);
      background: #fafbff;
    }

    .panel .content {
      padding: 16px;
    }

    .round-info {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #eef3ff;
      color: #2d4fd7;
      border: 1px solid #d6e0ff;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 14px;
      width: fit-content;
    }

    .small-text {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .picked-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .picked-item {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
      background: #fff;
    }

    .picked-item-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .picked-thumb {
      width: 54px;
      height: 72px;
      border-radius: 8px;
      overflow: hidden;
      background: #e5e7eb;
      flex-shrink: 0;
    }

    .picked-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .picked-title {
      font-weight: 600;
      font-size: 14px;
    }

    .picked-reason {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .main-panel {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      background: #fafbff;
      align-items: center;
    }

    .toolbar .status {
      margin-left: auto;
      color: var(--muted);
      font-size: 14px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button.primary {
      background: var(--primary);
      color: white;
    }

    button.primary:hover {
      background: var(--primary-dark);
    }

    button.secondary {
      background: #edf1f7;
      color: #1f2937;
    }

    button.secondary:hover {
      background: #e2e8f0;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .cards-grid {
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 12px;
    }

    .card {
      position: relative;
      aspect-ratio: 3 / 4;
      border-radius: 14px;
      background: white;
      border: 2px solid var(--border);
      box-shadow: 0 4px 14px rgba(0,0,0,0.05);
      cursor: pointer;
      overflow: hidden;
      transition: 0.2s ease;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      min-height: 140px;
      user-select: none;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: #b9c7ff;
    }

    .card.selected {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79, 124, 255, 0.15);
    }

    .card .image {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background: #f3f4f6;
    }

    .card .image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card .meta {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(3px);
      padding: 8px;
      border-top: 1px solid rgba(255,255,255,0.4);
      font-size: 12px;
      text-align: center;
    }

    .card .meta strong {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .card .selected-mark {
      position: absolute;
      top: 8px;
      right: 8px;
      background: var(--primary);
      color: white;
      border-radius: 999px;
      padding: 4px 7px;
      font-size: 12px;
      z-index: 2;
      display: none;
    }

    .card.selected .selected-mark {
      display: inline-block;
    }

    .form-area {
      padding: 16px;
      border-top: 1px solid var(--border);
      background: #fbfcff;
    }

    .form-area h3 {
      margin: 0 0 10px;
      font-size: 15px;
    }

    .form-area textarea {
      width: 100%;
      min-height: 110px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      font-size: 14px;
      outline: none;
      line-height: 1.6;
      background: #fff;
    }

    .form-area textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79, 124, 255, 0.12);
    }

    .form-actions {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .footer-note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      margin-top: 10px;
    }

    .result-page {
      padding: 16px;
    }

    .result-item {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
      background: #fff;
    }

    .result-item h4 {
      margin: 0 0 8px;
    }

    .result-item p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 1100px) {
      .app {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>OH卡四轮随机选择课堂网页</h1>
    <p>每轮随机展示 15–20 张卡，学生选择 1 张并填写原因，共 4 轮。</p>
  </header>

  <div class="app">
    <section class="panel">
      <h2>已选卡记录</h2>
      <div class="content">
        <div class="round-info">
          <div class="badge" id="roundBadge">当前：第 1 轮 / 共 4 轮</div>
          <div class="small-text">
            规则：每轮只能选 1 张卡。选择后必须填写原因，才能进入下一轮。
          </div>
        </div>
        <div style="height:16px;"></div>
        <div class="picked-list" id="pickedList"></div>
      </div>
    </section>

    <section class="panel main-panel">
      <div class="toolbar">
        <button class="secondary" id="regenBtn">重新生成</button>
        <button class="secondary" id="clearBtn">清空本轮选择</button>
        <button class="primary" id="nextBtn" disabled>确认选择并进入下一轮</button>
        <div class="status" id="statusText">请先从当前卡池中选择一张卡</div>
      </div>

      <div class="cards-grid" id="cardsGrid"></div>

      <div class="form-area">
        <h3>填写原因</h3>
        <textarea id="reasonInput" placeholder="请输入你选择这张卡的原因……"></textarea>
        <div class="form-actions">
          <button class="secondary" id="saveReasonBtn">保存原因</button>
        </div>
        <div class="footer-note">
          提示：建议每轮至少输入 10 个字以上，引导学生进行自我表达与反思。
        </div>
      </div>
    </section>

    <section class="panel">
      <h2>课程说明 / 最终结果</h2>
      <div class="content">
        <div class="small-text" id="infoBox">
          当前会从 88 张卡中随机抽出 15–20 张显示。点击卡片后即可选中，填写原因后进入下一轮。
        </div>
        <div style="height:16px;"></div>
        <div id="finalResult" class="hidden"></div>
      </div>
    </section>
  </div>

  <script>
    const TOTAL_CARDS = 88;
    const TOTAL_ROUNDS = 4;
    const MIN_SHOW = 15;
    const MAX_SHOW = 20;

    const allCards = Array.from({ length: TOTAL_CARDS }, (_, i) => ({
      id: i + 1,
      title: `OH卡 ${i + 1}`,
      image: `images/${i + 1}.jpg`
    }));

    let currentRound = 1;
    let currentPool = [];
    let selectedCard = null;
    let reasonByRound = {};

    const cardsGrid = document.getElementById("cardsGrid");
    const pickedList = document.getElementById("pickedList");
    const roundBadge = document.getElementById("roundBadge");
    const statusText = document.getElementById("statusText");
    const reasonInput = document.getElementById("reasonInput");
    const nextBtn = document.getElementById("nextBtn");
    const regenBtn = document.getElementById("regenBtn");
    const clearBtn = document.getElementById("clearBtn");
    const saveReasonBtn = document.getElementById("saveReasonBtn");
    const finalResult = document.getElementById("finalResult");
    const infoBox = document.getElementById("infoBox");

    generatePool();
    renderAll();

    regenBtn.addEventListener("click", () => {
      generatePool();
      selectedCard = null;
      reasonInput.value = "";
      nextBtn.disabled = true;
      statusText.textContent = `第 ${currentRound} 轮：已重新生成卡池，请重新选择一张卡`;
      renderCards();
    });

    clearBtn.addEventListener("click", () => {
      selectedCard = null;
      reasonInput.value = "";
      nextBtn.disabled = true;
      statusText.textContent = `第 ${currentRound} 轮：已清空本轮选择`;
      renderCards();
    });

    saveReasonBtn.addEventListener("click", () => {
      if (!selectedCard) {
        alert("请先选择一张卡。");
        return;
      }
      if (!reasonInput.value.trim()) {
        alert("请先填写原因。");
        return;
      }
      statusText.textContent = `第 ${currentRound} 轮：原因已保存，可以确认进入下一轮`;
      nextBtn.disabled = false;
    });

    nextBtn.addEventListener("click", () => {
      if (!selectedCard) {
        alert("请先选择一张卡。");
        return;
      }
      const reason = reasonInput.value.trim();
      if (!reason) {
        alert("请先填写原因。");
        return;
      }

      reasonByRound[currentRound] = {
        round: currentRound,
        card: selectedCard,
        reason
      };

      if (currentRound < TOTAL_ROUNDS) {
        currentRound++;
        selectedCard = null;
        reasonInput.value = "";
        nextBtn.disabled = true;
        generatePool();
        renderAll();
        statusText.textContent = `进入第 ${currentRound} 轮，请从新卡池中选择一张卡`;
      } else {
        renderAll();
        showFinalResult();
      }
    });

    reasonInput.addEventListener("input", () => {
      if (selectedCard && reasonInput.value.trim().length > 0) {
        nextBtn.disabled = false;
      } else {
        nextBtn.disabled = true;
      }
    });

    function generatePool() {
      const poolSize = randomInt(MIN_SHOW, MAX_SHOW);
      currentPool = shuffleArray([...allCards]).slice(0, poolSize);
    }

    function renderAll() {
      renderHeader();
      renderPickedList();
      renderCards();
    }

    function renderHeader() {
      roundBadge.textContent = currentRound <= TOTAL_ROUNDS
        ? `当前：第 ${currentRound} 轮 / 共 ${TOTAL_ROUNDS} 轮`
        : `已完成全部轮次`;
    }

    function renderPickedList() {
      pickedList.innerHTML = "";

      for (let r = 1; r <= TOTAL_ROUNDS; r++) {
        const item = reasonByRound[r];
        const div = document.createElement("div");
        div.className = "picked-item";

        if (item) {
          div.innerHTML = `
            <div class="picked-item-top">
              <div class="picked-thumb">
                <img src="${item.card.image}" alt="${item.card.title}" onerror="this.style.display='none'; this.parentElement.innerHTML='无图';" />
              </div>
              <div>
                <div class="picked-title">第 ${r} 轮：${item.card.title}</div>
                <div class="small-text">已选择</div>
              </div>
            </div>
            <div class="picked-reason"><strong>原因：</strong>${escapeHtml(item.reason)}</div>
          `;
        } else {
          div.innerHTML = `
            <div class="picked-item-top">
              <div class="picked-thumb" style="display:flex;align-items:center;justify-content:center;color:#6b7280;font-size:12px;">未选</div>
              <div>
                <div class="picked-title">第 ${r} 轮</div>
                <div class="small-text">尚未选择</div>
              </div>
            </div>
          `;
        }

        pickedList.appendChild(div);
      }
    }

    function renderCards() {
      cardsGrid.innerHTML = "";

      currentPool.forEach(card => {
        const el = document.createElement("div");
        el.className = "card" + (selectedCard && selectedCard.id === card.id ? " selected" : "");
        el.innerHTML = `
          <div class="selected-mark">已选</div>
          <div class="image">
            <img src="${card.image}" alt="${card.title}" onerror="this.parentElement.innerHTML='<div style=&quot;width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#999;font-size:12px;flex-direction:column;&quot;><div>图片加载失败</div><div>${card.title}</div></div>';" />
          </div>
          <div class="meta">
            <strong>${card.title}</strong>
            点击选择
          </div>
        `;

        el.addEventListener("click", () => {
          selectedCard = card;
          statusText.textContent = `已选择：${card.title}，请填写原因`;
          nextBtn.disabled = !(reasonInput.value.trim().length > 0);
          renderCards();
        });

        cardsGrid.appendChild(el);
      });
    }

    function showFinalResult() {
      infoBox.innerHTML = `<strong>已完成 4 轮选择。</strong> 下方显示最终结果，可用于课堂回顾与分享。`;
      finalResult.classList.remove("hidden");
      finalResult.innerHTML = `
        <h3 style="margin-top:0;">最终结果</h3>
        ${[1,2,3,4].map(r => {
          const item = reasonByRound[r];
          return `
            <div class="result-item">
              <h4>第 ${r} 轮：${item.card.title}</h4>
              <p><strong>原因：</strong>${escapeHtml(item.reason)}</p>
            </div>
          `;
        }).join("")}
      `;
      cardsGrid.innerHTML = "";
      statusText.textContent = "已完成全部轮次";
      nextBtn.disabled = true;
      regenBtn.disabled = true;
      clearBtn.disabled = true;
      saveReasonBtn.disabled = true;
      reasonInput.disabled = true;
    }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }
  </script>
</body>
</html>
